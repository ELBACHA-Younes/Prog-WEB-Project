<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/add.css">
    <title>FITRACK Add Workout</title>
</head>
<body>

  <!-- Hidden radio inputs for dot switching -->
  <input type="radio" name="slide" id="s1" checked>
  <input type="radio" name="slide" id="s2">

  <header>
    <div class="logo">FITRACK</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="workouts.html">Track Workouts</a></li>
        <li><a href="add.html">Add Workout</a></li>
        <li><a href="progress.html">Goals</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero" id="hero">
    <h1 id="hero-title">ADD STRENGTH</h1>
    <p id="hero-text">Log your strength workouts</p>
    <div class="dots">
      <label for="s1"></label>
      <label for="s2"></label>
    </div>
    <button id="hero-btn" onclick="scrollToSection()">Add Strength</button>
  </section>

  <section id="form-section" class="forms-container">

    <!-- Strength Form -->
    <form id="strength-form" class="form active">
      <h2>ADD STRENGTH</h2>
      <input type="text" name="workout_type" placeholder="Workout Type" required>
      <input type="date" name="date" required>
      <select name="rating" required>
        <option value="">Rating</option>
        <option value="1">⭐</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
      </select>
      <textarea name="notes" placeholder="Notes..."></textarea>
      <button type="submit">Save Strength Workout</button>
    </form>

    <!-- Cardio Form -->
    <form id="cardio-form" class="form">
      <h2>ADD CARDIO</h2>
      <input type="text" name="workout_type" placeholder="Workout Type" required>
      <input type="date" name="date" required>
      <input type="number" name="duration" placeholder="Time (minutes)" min="1" required>
      <select name="rating" required>
        <option value="">Rating</option>
        <option value="1">⭐</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
      </select>
      <textarea name="notes" placeholder="Notes..."></textarea>
      <button type="submit">Save Cardio Workout</button>
    </form>

  </section>

  <script src="js/add.js"></script>
</body>
</html>
